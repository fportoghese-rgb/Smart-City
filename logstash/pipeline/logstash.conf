input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["city-predictions"]
    codec => "json"
    group_id => "smartcity_logstash_viewer"
    auto_offset_reset => "earliest"
  }
}

filter {
  # Spark invia già un campo @timestamp (previsione a +5m).
  # Questo blocco assicura che Elasticsearch lo tratti come una data corretta.
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  # Rimuoviamo campi ridondanti per pulire l'indice su Elastic
  mutate {
    remove_field => ["event", "log", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "city-predictions"
  }
  
  # Fondamentale per il debug: vedi i dati passare nei log del container
  stdout { codec => rubydebug }
}